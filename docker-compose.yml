version: '3.8'

networks:
  frontend:
    external: true
  jarvis_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
    attachable: true

services:
  # --------------------------------------------------------
  # 1. CORE BRAIN (Critical Layer)
  # --------------------------------------------------------
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: jarvis_core
    networks:
      jarvis_network:
        ipv4_address: 172.25.0.40
      frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.jarvis-core.rule=Host(`jarvis.legeeksys.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.jarvis-core.entrypoints=websecure"
      - "traefik.http.routers.jarvis-core.tls=true"
      - "traefik.http.routers.jarvis-core.tls.certresolver=cloudflare"
      - "traefik.http.services.jarvis-core.loadbalancer.server.port=8100"
    environment:
      - SECRETSD_URL=http://jarvis_secretsd:8081
      - CLIENT_ID=backend
      - PORT=8100
      - CORS_ORIGINS=https://jarvis.legeeksys.fr,http://localhost:3000,http://127.0.0.1:3000
      - PYTHON_BRIDGES_URL=http://jarvis_voice:8005
    env_file: [".env"]
    volumes:
      - ai_models:/app/models
      - core_logs:/app/logs
      - core_data:/app/data
    restart: always # Must always stay up
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/memory_index:mode=777,uid=1000,gid=1000
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # --------------------------------------------------------
  # 2. LOCAL AI & MEMORY (Knowledge Layer)
  # --------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis_ollama
    networks:
      frontend:
      jarvis_network:
        ipv4_address: 172.25.0.30
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: [ "CMD", "bash", "-lc", "ollama --version >/dev/null 2>&1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 12G # Ollama needs RAM for local models
        reservations:
          memory: 4G

  # --------------------------------------------------------
  # 3. SENSORS: VOICE & NLP (Non-Critical Layer)
  # --------------------------------------------------------
  voice:
    build:
      context: ./python-bridges
      dockerfile: Dockerfile
    container_name: jarvis_voice
    networks:
      jarvis_network:
        ipv4_address: 172.25.0.50
      frontend:
    environment:
      - AI_CONCURRENCY_LIMIT=2
      - HOST=0.0.0.0
      - PORT=8005
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.jarvis-voice.rule=Host(`jarvis.legeeksys.fr`) && PathPrefix(`/api/voice`)"
      - "traefik.http.routers.jarvis-voice.entrypoints=websecure"
      - "traefik.http.routers.jarvis-voice.tls=true"
      - "traefik.http.routers.jarvis-voice.tls.certresolver=cloudflare"
      - "traefik.http.middlewares.voice-strip.stripprefix.prefixes=/api/voice"
      - "traefik.http.routers.jarvis-voice.middlewares=voice-strip"
      - "traefik.http.services.jarvis-voice.loadbalancer.server.port=8005"
    env_file: [".env"]
    volumes:
      - ai_models:/app/models
      - voice_logs:/app/logs
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/jarvis/.cache:mode=777,uid=1000,gid=1000
    deploy:
      resources:
        limits:
          memory: 8G # ML is heavy. If it OOMs, only this container dies.
        reservations:
          memory: 2G

  # --------------------------------------------------------
  # 4. INTERFACE: WEB DASHBOARD (Non-Critical Layer)
  # --------------------------------------------------------
  dashboard:
    build:
      context: ./jarvis-dashboard
      dockerfile: Dockerfile
    container_name: jarvis_dashboard
    networks:
      jarvis_network:
        ipv4_address: 172.25.0.60
      frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.jarvis.rule=Host(`jarvis.legeeksys.fr`)"
      - "traefik.http.routers.jarvis.entrypoints=websecure"
      - "traefik.http.routers.jarvis.tls=true"
      - "traefik.http.routers.jarvis.tls.certresolver=cloudflare"
      - "traefik.http.services.jarvis.loadbalancer.server.port=3000"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # --------------------------------------------------------
  # 5. SECURITY: SECRETS VAULT (Critical Layer)
  # --------------------------------------------------------
  secretsd:
    build:
      context: ./jarvis-secretsd
      dockerfile: Dockerfile
    container_name: jarvis_secretsd
    networks:
      frontend:
      jarvis_network:
        ipv4_address: 172.25.0.5
    volumes:
      # Hardware binding
      - /etc/machine-id:/etc/machine-id:ro
      # Persistent storage for API keys and DB passwords
      - secrets_data:/opt/jarvis/secrets/persistent
      # Note: We removed tmpfs for vault storage to prevent postgres password desync after reboot.
      # The master key should be securely injected via environment or Systemd Credentials in production.
    tmpfs:
      - /opt/jarvis/audit:size=10M,mode=700,uid=1000,gid=1000
      - /opt/jarvis/run:size=1M,mode=700,uid=1000,gid=1000
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true




